# After API tests pass, build and push API + Web images to GitHub Container Registry (ghcr.io).
# Deploy is still on your side: pull these images and set env/secrets on the host or platform.
name: Publish container images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  api-tests:
    name: API (pytest)
    runs-on: ubuntu-latest
    env:
      ENV: development
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  image-names:
    name: Image names (lowercase for GHCR)
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.names.outputs.api }}
      web: ${{ steps.names.outputs.web }}
    steps:
      - id: names
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "api=${{ env.REGISTRY }}/${repo_lower}/api" >> "$GITHUB_OUTPUT"
          echo "web=${{ env.REGISTRY }}/${repo_lower}/web" >> "$GITHUB_OUTPUT"

  push-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    needs: [api-tests, image-names]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.image-names.outputs.api }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-web:
    name: Build & push Web image
    runs-on: ubuntu-latest
    needs: [api-tests, image-names]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.image-names.outputs.web }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/prod.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_ATTENDANCE_API_URL=${{ vars.VITE_ATTENDANCE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
